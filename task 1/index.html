<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="left-side">
                <div class="overlay-text">
                    <h1>Hello World.</h1>
                    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
                </div>
            </div>

            <div class="right-side">
                <h2>Register</h2>
                <p class="subtitle">Don't have an account? <a href="#">Create your account</a>, it takes less than a minute.</p>

                <form>
                    <div class="input-group">
                        <label>NAME</label>
                        <input type="text" placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label>EMAIL ID</label>
                        <input type="email" placeholder="example@mail.com">
                    </div>
                    <div class="input-group">
                        <label>PHONE NO</label>
                        <div class="phone-input">
                            <span>+62</span>
                            <input type="text">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>PASSWORD</label>
                        <input type="password" value="......">
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms">
                        <label for="terms">I Accept terms and conditions & privacy policy</label>
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>
                </form>

                <div class="social-login">
                    <p>Login with social media</p>
                    <div class="social-btns">
                        <a href="#" class="fb"><i class="fab fa-facebook-f"></i> Facebook</a>
                        <a href="#" class="tw"><i class="fab fa-twitter"></i> Twitter</a>
                        <a href="#" class="gp"><i class="fab fa-google-plus-g"></i> Google+</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
